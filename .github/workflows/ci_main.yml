---
name: CI (main)
# This workflow is triggered on pushes to main and runs tests and performs the release steps

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      enableAzdo:
        description: Run AzDO steps
        type: boolean
        default: true

permissions:
  contents: write
  packages: write
  pull-requests: write
  checks: write

jobs:
  build-test-publish:
    name: "Build, test, publish"
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/ci_common.yml
    with:
      release: true
      enableAzdo: ${{ inputs.enableAzdo == '' && true || inputs.enableAzdo }}
    secrets:
      AZDO_TOKEN: ${{ secrets.AZDO_TOKEN }}
